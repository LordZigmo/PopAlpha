name: iOS Build

# Compile-checks the native iOS app on a macOS runner. SwiftUI/UIKit can't
# build on Linux, so this is the gate that verifies iOS changes actually
# compile. Path-filtered to ios/** to avoid spending macOS minutes on
# web-only changes.

on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator (Debug, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/PopAlphaApp.xcodeproj \
            -scheme PopAlphaApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build for device (Release, no signing) — archive-equivalent compile
        # Closes the gap between the Debug/Simulator smoke above and what an
        # archive actually does: Release optimizations + the device (arm64)
        # SDK. Signing is still disabled — the archive itself layers signing
        # on top, but this catches Release-only / device-only compile breaks.
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/PopAlphaApp.xcodeproj \
            -scheme PopAlphaApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
