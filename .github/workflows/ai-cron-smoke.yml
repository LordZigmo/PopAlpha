name: AI cron smoke (production)

# Runs the AI-cron smoke check (scripts/check-ai-cron-smoke.mjs) against the
# live PRODUCTION site to catch the silent-LLM-fallback class — see
# docs/external-api-failure-modes.md.
#
# Why it points at https://popalpha.ai (the public prod domain) instead of the
# deployment_status.environment_url: every Vercel *deployment* URL — preview AND
# the per-deploy production URL — sits behind Deployment Protection (an SSO
# wall), so the check only ever got HTTP 401 and WARNed; it never actually ran.
# The public production alias is NOT behind that wall (the cron routes gate
# themselves with requireCron / CRON_SECRET), so hitting it with the cron secret
# reaches the real LLM path that users' data flows through.
#
# Triggers:
#   - deployment_status: auto-run after each successful PRODUCTION deploy.
#   - workflow_dispatch: run on demand (Actions tab or `gh workflow run`).
#
# NOTE: deployment_status-triggered workflows only run from the file on the
# default branch, so changes here take effect after merge to main.
#
# Prereqs: repo Actions secret CRON_SECRET must match production's CRON_SECRET
# (unified across envs). The smoke script SKIPS (exit 0) if CRON_SECRET is empty.
# It HARD-FAILS only on the Incident-2 silent lie (HTTP 200 + ok:true while the
# LLM never ran) and WARNs (exit 0) on everything else (non-2xx, ok:false, 401).

on:
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-cron-smoke:
    # Manual runs always; auto runs only on successful Production deploys.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        (
          contains(github.event.deployment_status.environment, 'Production') ||
          contains(github.event.deployment_status.environment, 'production')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # No `npm ci` — the smoke script has zero dependencies (uses global fetch).
      - name: Smoke-test AI crons against production
        env:
          # Public prod alias (not the SSO-walled per-deploy URL). See header.
          SMOKE_BASE_URL: https://popalpha.ai
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run check:ai-cron-smoke
